server:
  port: ${PORT:8080}

spring:
  application:
    name: deploy-guide-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/deploy_guide}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  seed:
    enabled: ${SEED_DATA_ENABLED:true}

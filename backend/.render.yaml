services:
  - type: web
    name: deploy-guide-api
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/deploy-guide-api-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SEED_DATA_ENABLED
        value: "true"
